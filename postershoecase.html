<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Innovators Summit | Digital Poster</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="poster-container">
        <!-- Floating decorative elements -->
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
        
        <main class="glass-card">
            <header class="poster-header">
                <span class="badge">Global Event 2026</span>
                <h1 class="title">FUTURE<br><span class="gradient-text">INNOVATORS</span><br>SUMMIT</h1>
            </header>
            
            <section class="poster-body">
                <p class="tagline">Shaping tomorrow's technology, today. Join the world's brightest minds in AI, Web3, and Quantum Computing.</p>
                
                <div class="details-grid">
                    <div class="detail-item">
                        <span class="detail-icon">📅</span>
                        <div>
                            <strong>OCTOBER 15-17</strong>
                            <span>3 Days of Innovation</span>
                        </div>
                    </div>
                    <div class="detail-item">
                        <span class="detail-icon">📍</span>
                        <div>
                            <strong>SILICON VALLEY</strong>
                            <span>& Virtual Worldwide</span>
                        </div>
                    </div>
                </div>
            </section>
            
            <footer class="poster-footer">
                <a href="#" class="cta-button">
                    <span>Reserve Your Spot</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
                <div class="sponsors">
                    <p>Powered by NextGen Tech</p>
                </div>
            </footer>
        </main>
    </div>
</body>
</html>
